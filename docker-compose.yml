services:

  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  migration-runner:
    build:
      context: .
      dockerfile: infra/docker/migration-runner.Dockerfile
    depends_on:
      postgresql:
        condition: service_healthy
    env_file:
      - ./env/migration-runner.env

  scrapper:
    build:
      context: .
      dockerfile: infra/docker/scrapper.Dockerfile
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    env_file:
      - ./env/scrapper.env
    ports:
      - "8080:8080"

  bot:
    build:
      context: .
      dockerfile: infra/docker/bot.Dockerfile
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    env_file:
      - ./env/bot.env
    ports:
      - "8081:8081"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - scrapper
      - bot

  grafana:
    image: grafana/grafana
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  pg-data:
